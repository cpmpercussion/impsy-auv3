name: IMPSY-AUv3
options:
  bundleIdPrefix: au.charlesmartin.impsy
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  swift: "5.9"
  generateEmptyDirectories: true
  postGenCommand: echo "Project generated. See README.md to add TFLite dependency."

settings:
  base:
    DEVELOPMENT_TEAM: EDH387FRHA

# NOTE: After generating, add TFLite via File → Add Package Dependencies in Xcode.
# Recommended: https://github.com/google-ai-edge/LiteRT  product: LiteRT
# Then change `import TensorFlowLite` to `import LiteRT` in TFLiteRNN.swift

packages:
  TensorFlowLiteSwift:
    url: https://github.com/kewlbear/TensorFlowLiteSwift.git
    branch: master

targets:

  # ── iOS Host App ──────────────────────────────────────────────────────────────
  IMPSYHost-iOS:
    type: application
    platform: iOS
    sources:
      - path: IMPSYHost/iOS
        excludes: ["Info.plist"]
      # Compile AU logic directly into the host so it can be instantiated
      # without auriserver (iOS does not allow bundle.load() on .appex files
      # and has no loadInProcess option, so the extension mechanism is only
      # usable once auriserver scans it — which is unreliable in development).
      - path: IMPSYExtension/Common
      - path: IMPSYUI
      # Bundled default model (and any other resources)
      - path: Resources
        buildPhase: resources
        excludes: ["AppIcon"]
      # App icon asset catalog (universal — iOS + macOS idioms)
      - IMPSYHost/Assets.xcassets
    dependencies:
      - target: IMPSYExtension-iOS
        embed: true
        codeSign: true
      - package: TensorFlowLiteSwift
      - sdk: CoreML.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.charlesmartin.impsy
        INFOPLIST_FILE: IMPSYHost/iOS/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        OTHER_LDFLAGS: "-ObjC"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: IMPSYHost/iOS/Info.plist
      properties:
        CFBundleDisplayName: IMPSY
        UIRequiredDeviceCapabilities: [arm64]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSDocumentsFolderUsageDescription: "IMPSY loads TFLite model files from your Files app."
        # An (empty) launch screen tells iOS the app supports native screen
        # sizes. Without it the app runs letterboxed in compatibility mode.
        UILaunchScreen: {}
        LSApplicationCategoryType: public.app-category.music
        NSHumanReadableCopyright: "Copyright © 2026 Charles Martin. All rights reserved."
        ITSAppUsesNonExemptEncryption: false

  # ── macOS Host App ────────────────────────────────────────────────────────────
  IMPSYHost-macOS:
    type: application
    platform: macOS
    sources:
      - path: IMPSYHost/macOS
        excludes: ["Info.plist"]
      # App icon asset catalog (universal — iOS + macOS idioms)
      - IMPSYHost/Assets.xcassets
      - path: Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    dependencies:
      - target: IMPSYExtension-macOS
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.charlesmartin.impsy
        INFOPLIST_FILE: IMPSYHost/macOS/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: IMPSYHost/macOS/Info.plist
      properties:
        CFBundleName: IMPSY
        NSDocumentsFolderUsageDescription: "IMPSY loads TFLite model files from your Files app."
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSApplicationCategoryType: public.app-category.music
        NSHumanReadableCopyright: "Copyright © 2026 Charles Martin. All rights reserved."
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: IMPSYHost/macOS/IMPSYHost_macOS.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.temporary-exception.audio-unit-host: true

  # ── iOS AUv3 Extension ────────────────────────────────────────────────────────
  IMPSYExtension-iOS:
    type: app-extension
    platform: iOS
    sources:
      - path: IMPSYExtension/Common
      - path: IMPSYExtension/iOS
        excludes: ["IMPSYExtension_iOS-Info.plist"]
      - path: IMPSYUI
      # Bundled default model (and any other resources)
      - path: Resources
        buildPhase: resources
        excludes: ["AppIcon"]
      # App icon — AUv3 hosts (AUM) read the icon from the .appex bundle
      - IMPSYHost/Assets.xcassets
    dependencies:
      - package: TensorFlowLiteSwift
      - sdk: CoreML.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.charlesmartin.impsy.IMPSYExtension
        INFOPLIST_FILE: IMPSYExtension/iOS/IMPSYExtension_iOS-Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Required for TFLite on iOS
        OTHER_LDFLAGS: "-ObjC"
    entitlements:
      path: IMPSYExtension/iOS/IMPSYExtension_iOS.entitlements
      properties:
        com.apple.security.files.user-selected.read-only: true

  # ── macOS AUv3 Extension ──────────────────────────────────────────────────────
  IMPSYExtension-macOS:
    type: app-extension
    platform: macOS
    sources:
      - path: IMPSYExtension/Common
      - path: IMPSYExtension/macOS
        excludes: ["IMPSYExtension_macOS-Info.plist"]
      - path: IMPSYUI
      # Bundled default model (and any other resources)
      - path: Resources
        buildPhase: resources
        excludes: ["AppIcon"]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.charlesmartin.impsy.IMPSYExtension
        INFOPLIST_FILE: IMPSYExtension/macOS/IMPSYExtension_macOS-Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        OTHER_LDFLAGS: "-ObjC"
    entitlements:
      path: IMPSYExtension/macOS/IMPSYExtension_macOS.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-only: true

  # ── Unit Tests ────────────────────────────────────────────────────────────────
  IMPSYTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
      - path: IMPSYExtension/Common
        excludes:
          # Exclude AU-specific files that need entitlements/framework
          - "IMPSYAudioUnit*.swift"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.charlesmartin.impsy.tests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "YES"
