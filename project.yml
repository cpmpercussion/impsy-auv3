name: IMPSY-AUv3
options:
  bundleIdPrefix: au.charlesmartin.impsy
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  swift: "5.9"
  generateEmptyDirectories: true
  postGenCommand: echo "Project generated. Run scripts/build_tflite_xcframework.sh before first build."

settings:
  base:
    DEVELOPMENT_TEAM: EDH387FRHA
    # macOS support is Apple Silicon only — the vended TFLite xcframework
    # ships no x86_64 macOS slice (see scripts/build_tflite_xcframework.sh).
    # Without this, Xcode Cloud's Release archive builds universal by default
    # and fails to link _TfLite* symbols on x86_64.
    "ARCHS[sdk=macosx*]": arm64
    # Required by Apple's notary service. The Xcode GUI's Distribute App flow
    # auto-enables Hardened Runtime, but `xcodebuild -exportArchive` (used by
    # scripts/release-macos.sh) respects only what the archive carries — so the
    # project itself must opt in. Harmless for Debug; required for Developer ID
    # distribution and the App Store.
    ENABLE_HARDENED_RUNTIME: "YES"

# TFLite is vended through Packages/TensorFlowLite as a local Swift Package.
# The package's binary xcframework is produced by
# `scripts/build_tflite_xcframework.sh` (combining kewlbear iOS slices with
# a tphakala macOS arm64 slice). Run that script once after cloning; it's
# also invoked from ci_scripts/ci_post_clone.sh on Xcode Cloud runners.

packages:
  TensorFlowLite:
    path: Packages/TensorFlowLite
  TOMLKit:
    url: https://github.com/LebJe/TOMLKit.git
    from: "0.6.0"

targets:

  # ── iOS Host App ──────────────────────────────────────────────────────────────
  IMPSYHost-iOS:
    type: application
    platform: iOS
    scheme:
      testTargets:
        - IMPSYUITests-iOS
    postBuildScripts:
      - script: |
          "$SRCROOT/scripts/patch_tflite_plists.sh"
        name: "Patch TFLite framework Info.plists"
        basedOnDependencyAnalysis: false
    sources:
      - path: IMPSYHost/iOS
        excludes: ["Info.plist"]
      # Code shared by both host targets (e.g. CoreMIDIBridge — exposes the
      # in-process AU as a pair of Core MIDI virtual endpoints for DAWs that
      # don't host AUv3 MIDI processors).
      - path: IMPSYHost/Common
      # Compile AU logic directly into the host so it can be instantiated
      # without auriserver (iOS does not allow bundle.load() on .appex files
      # and has no loadInProcess option, so the extension mechanism is only
      # usable once auriserver scans it — which is unreliable in development).
      - path: IMPSYExtension/Common
      - path: IMPSYUI
      # Bundled default model (and any other resources)
      - path: Resources
        buildPhase: resources
        excludes: ["AppIcon"]
      # App icon asset catalog (universal — iOS + macOS idioms)
      - IMPSYHost/Assets.xcassets
    dependencies:
      - target: IMPSYExtension-iOS
        embed: true
        codeSign: true
      - package: TensorFlowLite
      - package: TOMLKit
      - sdk: CoreML.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.charlesmartin.impsy
        INFOPLIST_FILE: IMPSYHost/iOS/Info.plist
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        OTHER_LDFLAGS: "-ObjC"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: IMPSYHost/iOS/Info.plist
      properties:
        CFBundleDisplayName: IMPSY
        UIRequiredDeviceCapabilities: [arm64]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSDocumentsFolderUsageDescription: "IMPSY loads TFLite model files from your Files app."
        # An (empty) launch screen tells iOS the app supports native screen
        # sizes. Without it the app runs letterboxed in compatibility mode.
        UILaunchScreen: {}
        LSApplicationCategoryType: public.app-category.music
        NSHumanReadableCopyright: "Copyright © 2026 Charles Martin. All rights reserved."
        ITSAppUsesNonExemptEncryption: false

  # ── macOS Host App ────────────────────────────────────────────────────────────
  IMPSYHost-macOS:
    type: application
    platform: macOS
    scheme:
      testTargets:
        - IMPSYTests
        - IMPSYUITests-macOS
    sources:
      - path: IMPSYHost/macOS
        excludes: ["Info.plist"]
      # Code shared by both host targets (e.g. CoreMIDIBridge — exposes the
      # in-process AU as a pair of Core MIDI virtual endpoints for DAWs that
      # don't host AUv3 MIDI processors).
      - path: IMPSYHost/Common
      # Compile AU logic directly into the host so it can be instantiated
      # in-process — matches the iOS host, and avoids depending on
      # audiocomponentd having registered the extension (which is unreliable
      # for development builds).
      - path: IMPSYExtension/Common
      - path: IMPSYUI
      # Bundled default model (and any other resources)
      - path: Resources
        buildPhase: resources
        excludes: ["AppIcon"]
      # App icon asset catalog (universal — iOS + macOS idioms)
      - IMPSYHost/Assets.xcassets
    dependencies:
      - target: IMPSYExtension-macOS
        embed: true
        codeSign: true
      - package: TensorFlowLite
      - package: TOMLKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.charlesmartin.impsy
        INFOPLIST_FILE: IMPSYHost/macOS/Info.plist
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: IMPSYHost/macOS/Info.plist
      properties:
        CFBundleName: IMPSY
        NSDocumentsFolderUsageDescription: "IMPSY loads TFLite model files from your Files app."
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSApplicationCategoryType: public.app-category.music
        NSHumanReadableCopyright: "Copyright © 2026 Charles Martin. All rights reserved."
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: IMPSYHost/macOS/IMPSYHost_macOS.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.temporary-exception.audio-unit-host: true

  # ── iOS AUv3 Extension ────────────────────────────────────────────────────────
  IMPSYExtension-iOS:
    type: app-extension
    platform: iOS
    postBuildScripts:
      - script: |
          "$SRCROOT/scripts/patch_tflite_plists.sh"
        name: "Patch TFLite framework Info.plists"
        basedOnDependencyAnalysis: false
    sources:
      - path: IMPSYExtension/Common
      - path: IMPSYExtension/iOS
        excludes: ["IMPSYExtension_iOS-Info.plist"]
      - path: IMPSYUI
      # Bundled default model (and any other resources)
      - path: Resources
        buildPhase: resources
        excludes: ["AppIcon"]
      # App icon — AUv3 hosts (AUM) read the icon from the .appex bundle
      - IMPSYHost/Assets.xcassets
    dependencies:
      - package: TensorFlowLite
      - package: TOMLKit
      - sdk: CoreML.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.charlesmartin.impsy.IMPSYExtension
        INFOPLIST_FILE: IMPSYExtension/iOS/IMPSYExtension_iOS-Info.plist
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Required for TFLite on iOS
        OTHER_LDFLAGS: "-ObjC"
    entitlements:
      path: IMPSYExtension/iOS/IMPSYExtension_iOS.entitlements
      properties:
        com.apple.security.files.user-selected.read-write: true

  # ── macOS AUv3 Extension ──────────────────────────────────────────────────────
  IMPSYExtension-macOS:
    type: app-extension
    platform: macOS
    sources:
      - path: IMPSYExtension/Common
      - path: IMPSYExtension/macOS
        excludes: ["IMPSYExtension_macOS-Info.plist"]
      - path: IMPSYUI
      # Bundled default model (and any other resources)
      - path: Resources
        buildPhase: resources
        excludes: ["AppIcon"]
    dependencies:
      - package: TensorFlowLite
      - package: TOMLKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.charlesmartin.impsy.IMPSYExtension
        INFOPLIST_FILE: IMPSYExtension/macOS/IMPSYExtension_macOS-Info.plist
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        OTHER_LDFLAGS: "-ObjC"
    entitlements:
      path: IMPSYExtension/macOS/IMPSYExtension_macOS.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true

  # ── Unit Tests ────────────────────────────────────────────────────────────────
  IMPSYTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        excludes:
          - "Fixtures/**"
      # Fixtures (TOML configs + .tflite models) are bundled as resources so
      # tests can read them via `Bundle(for:).url(forResource:)`.
      - path: Tests/Fixtures
        buildPhase: resources
        includes:
          - "*.toml"
          - "*.tflite"
      - path: IMPSYExtension/Common
        excludes:
          # Exclude AU-specific files that need entitlements/framework
          - "IMPSYAudioUnit*.swift"
    dependencies:
      - package: TensorFlowLite
      - package: TOMLKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.charlesmartin.impsy.tests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "YES"

  # ── iOS UI Tests ──────────────────────────────────────────────────────────────
  # Drives the iOS host in the simulator. Cross-platform test cases live under
  # TestsUI/Shared and are compiled into both UI test targets.
  IMPSYUITests-iOS:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TestsUI/Shared
      - path: Tests/Fixtures
        buildPhase: resources
    dependencies:
      - target: IMPSYHost-iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.charlesmartin.impsy.uitests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_TARGET_NAME: IMPSYHost-iOS

  # ── macOS UI Tests ────────────────────────────────────────────────────────────
  # Drives the macOS host in the user's session. Shares all of TestsUI/Shared
  # with the iOS target; TestsUI/macOS holds macOS-only smokes (CoreMIDI
  # bridge status label).
  IMPSYUITests-macOS:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: TestsUI/Shared
      - path: TestsUI/macOS
      - path: Tests/Fixtures
        buildPhase: resources
    dependencies:
      - target: IMPSYHost-macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.charlesmartin.impsy.uitests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_TARGET_NAME: IMPSYHost-macOS
